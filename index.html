<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Library | Discover Your Next Great Read</title>
  <link rel="stylesheet" href="./src/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <header class="header">
      <div class="container">

        <div class="header-logo">
          <span class="logo-icon">
            <img src="/assets/icons/Book.svg" alt="Library Logo">
          </span>
          <div class="logo-text">
            <h2 class="logo-text-title">The Library</strong>
              <h4 class="logo-text-description">Discover your next favorite book</span>
          </div>
        </div>
        <div id="theme-toggle-root"></div>
      </div>


    </header>


    <main class="container">


      <section class="hero-section">
        <h1 class="hero-section-title">Discover Your Next Great Read</h1>
        <p class="hero-section-description">Search millions of books, build your personal library, and never lose track
          of what to read next.</p>
        <div id="search-component-root" class="search-placeholder"></div>
        <div id="search-skeleton" class="search-skeleton">
          <div class="skeleton-input"></div>
          <div class="skeleton-button"></div>
        </div>
        <div class="filter-box">
          <label for="author-select" class="filter-label">Фильтр по автору:</label>
          <select id="author-select" class="custom-select">
            <option value="">Все авторы</option>
          </select>
        </div>
      </section>
      <section class="main-section">
        <div id="books-grid" class="books-grid"></div>
        <div class="favorite-books">
          <div class="favorite-books-header">
            <span class="favorite-books-icon">
              <img src="/assets/icons/heart.svg" class="favorite-icon" alt="Favorite icon">
            </span>
            <div class="favorite-header-text">
              <h5 class="favorite-title">Favorites</h5>
              <p class="favorite-count">3 books saved</p>
            </div>
          </div>
          <div id="books-favorite" class="books-favorite-list"></div>
        </div>


      </section>


    </main>

    <footer class="footer">
      <div class="container">
        <p>Powered by <a href="https://openlibrary.org/" target="_blank" class="footer-link">Open Library</a></p>
      </div>



    </footer>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
